services:
  searxng:
    image: searxng/searxng:2026.7.15-7b2199ecd@sha256:268fdb05efbb7b4fdc5957a20c42389bfb1b1b27b5eddeb98f75ec80c45b960f
    container_name: searxng-fpk
    restart: unless-stopped
    ports:
      - "${wizard_service_port:-8080}:8080"
    volumes:
      - "${TRIM_PKGETC}/searxng/settings.yml:/etc/searxng/settings.yml:rw"
      - "${TRIM_PKGETC}/searxng/branding/searxng-wordmark.svg:/usr/local/searxng/searx/templates/simple/searxng-wordmark.min.svg:ro"
      - "${TRIM_PKGETC}/searxng/branding/searxng.png:/usr/local/searxng/searx/static/themes/simple/img/searxng.png:ro"
      - "${TRIM_PKGETC}/searxng/branding/favicon.png:/usr/local/searxng/searx/static/themes/simple/img/favicon.png:ro"
      - "${TRIM_PKGETC}/searxng/branding/favicon.svg:/usr/local/searxng/searx/static/themes/simple/img/favicon.svg:ro"
      - "${TRIM_PKGETC}/searxng/branding/192.png:/usr/local/searxng/searx/static/themes/simple/img/192.png:ro"
      - "${TRIM_PKGETC}/searxng/branding/512.png:/usr/local/searxng/searx/static/themes/simple/img/512.png:ro"
      - "${TRIM_PKGVAR}/searxng/cache:/var/cache/searxng:rw"
    healthcheck:
      test:
        - CMD
        - /usr/local/searxng/.venv/bin/python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=3).read()
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  admin:
    image: searxng/searxng:2026.7.15-7b2199ecd@sha256:268fdb05efbb7b4fdc5957a20c42389bfb1b1b27b5eddeb98f75ec80c45b960f
    container_name: searxng-admin-fpk
    restart: unless-stopped
    user: "${TRIM_UID}:${TRIM_GID}"
    entrypoint:
      - /app/server/searxng-admin
    command:
      - --socket
      - /app/admin.sock
      - --web-root
      - /app/admin-ui
      - --gateway-prefix
      - /app/searxng-admin
      - --service-port
      - "${wizard_service_port:-8080}"
      - --settings
      - /config/settings.yml
      - --branding-dir
      - /config/branding
      - --default-settings
      - /usr/local/searxng/searx/settings.yml
      - --apply-socket
      - /data/control/apply.sock
      - --health-url
      - http://searxng:8080/healthz
      - --apply-timeout
      - 60s
    volumes:
      - "${TRIM_APPDEST}:/app:rw"
      - "${TRIM_PKGETC}/searxng:/config:rw"
      - "${TRIM_PKGVAR}:/data:rw"
    depends_on:
      - searxng
      - apply-controller

  apply-controller:
    image: searxng/searxng:2026.7.15-7b2199ecd@sha256:268fdb05efbb7b4fdc5957a20c42389bfb1b1b27b5eddeb98f75ec80c45b960f
    container_name: searxng-apply-fpk
    restart: unless-stopped
    user: "${TRIM_UID}:${TRIM_GID}"
    group_add:
      - "995"
    entrypoint:
      - /app/server/searxng-admin
    command:
      - --mode
      - apply-controller
      - --socket
      - /control/apply.sock
      - --socket-mode
      - "0660"
      - --docker-socket
      - /var/run/docker.sock
      - --container
      - searxng-fpk
    network_mode: none
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    volumes:
      - "${TRIM_APPDEST}:/app:ro"
      - "${TRIM_PKGVAR}/control:/control:rw"
      - "/var/run/docker.sock:/var/run/docker.sock:rw"
    depends_on:
      - searxng
